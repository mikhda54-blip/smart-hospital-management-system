<!DOCTYPE html>
<html>
<head>
    <title>Doctor Records</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

<h1>Doctor Records</h1>

<table border="1">

<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Specialization</th>
    <th>Phone</th>
</tr>

{% for doctor in doctors %}
<tr>
    <td>{{ doctor[0] }}</td>
    <td>{{ doctor[1] }}</td>
    <td>{{ doctor[2] }}</td>
    <td>{{ doctor[3] }}</td>
</tr>
{% endfor %}

</table>

</div>

</body>
</html>
